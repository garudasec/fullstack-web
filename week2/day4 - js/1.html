<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise</title>
</head>
<body>
    
    <script>
        // 1. create a new promise
        var promise = new Promise((resolve, reject) => {
            return reject("Promise has resolved");
        });
        console.log(promise);

        // 2. Read values from promise
        promise.then((res) => {
            console.log(res);
        }).catch((rej) => {
            console.log(rej);          
        })
        
    </script>
</body>
</html>
