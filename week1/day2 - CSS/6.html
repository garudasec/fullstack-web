<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css selectors</title>
    <style>
        *{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1{
            background-color: yellow;
        }
        #p1{
            color: green;
        }
        #p2{
            color: red;
        }
        div, p, #p2 {
            border: 1px solid teal;
        }
        .heading2 {
            background-color: firebrick;
        }


    </style>
</head>
<body>
    <div>I am box 1</div>
    <h1>hello from heading 1</h1>
    <h2 class="heading2">hello from heading 2</h2>
    <h2 class="heading2">hello from heading </h2>
    <p id="p1">hellow from paragraph 1</p>
    <p id="p2">hellow from paragraph 2</p>
    <div>
        <span>helloo</span>
    </div>

    
</body>
</html>
