<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>
    <style>
        .cont>div{
            width: 50px;
            border: 1px solid rgb(1, 0, 0);
            font-size: 30px;
            padding: 30px;
        }

        .cont>div:nth-child(1){
            background-color: rgb(14, 132, 172);
        }
        .cont>div:nth-child(2){
            background-color: rgb(0, 212, 0);
        }
        .cont>div:nth-child(3){
            background-color: rgb(172, 22, 45);
        }

        .cont{
            border: 1px solid black;
            padding: 20px;
            margin: 20px;
            height: 500px;
            background-color: rgb(147, 218, 218);
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;

        }
    </style>
</head>
<body>
    <div class="cont">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>

    
</body>
</html>
