<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Transition</title>
    <style>
      .cont {
        width: 200px;
        height: 200px;
        background-color: rgb(57, 57, 180);
        transition-property: all;
        transition-duration: 5s;
        transition-delay: 2s;
        transition-timing-function: ease-in;
      }


      .cont:hover {
        width: 400px;
        height: 400px;
        background-color: rgb(158, 32, 32);
        border-radius: 20%;
      }
    </style>
  </head>
  <body>
    <div class="cont"></div>
  </body>
</html>
