<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Element</title>
    <style>
        p::before{
            content: "❤️";
        }

        P::after{
            content: "🔥";
        }

        h3::first-letter{
            color: rgb(17, 31, 121);
            font-size: 40px;
        }

        h3::first-line{
            color: rgb(117, 81, 174);
        }

    </style>
</head>
<body>
    <p>Welcome to the pseudo element</p>

    <h3>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Animi dolorum suscipit, ipsam voluptates sapiente vitae quos illo at praesentium perspiciatis nemo voluptatum ut ad repudiandae aperiam necessitatibus ea nam!</h3>
    
</body>
</html>
