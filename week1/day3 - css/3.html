<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css positions</title>
    <style>
        .cont{
            height: 1200px;
            border: 1px solid rgb(248, 55, 55);
            padding: 20px;
        }

        .cont>div{
            border: 1px solid black;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="cont">
        <div id="static">Static Position</div>
        <div id="relative">Relative Position</div>
        <div id="absolute">Absolute Position</div>
        <div id="fixed">Fixed Position</div>
    </div>

    <div class="cont">
        <div id="sticky"></div>
    </div>
    
</body>
</html>
