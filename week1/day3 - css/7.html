<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform</title>
    <style>
        .outer{
            width: 400px;
            height: 400px;
            background-color: rgb(14, 85, 127);
            position: relative;
        }

        .inner{
            text-align: center;
            width: 120px;
            height: 120px;
            background-color: rgb(218, 236, 83);
            position: absolute;
            top: 50%;
            left: 50%;
            /* transform: scale(.5); */
            /* transform: rotate(70deg); */
            /* transform: skew(30deg); */
            transform: translate(-50%, -50%);
                }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">I am Inner Box</div>
    </div>
    
</body>
</html>
